<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Personal Finance</title>
    <style>
        :root {
            --bg-color:     #000000;
            --card-bg:      #1c1c1e;
            --accent-green: #34c759;
            --text-main:    #ffffff;
            --text-dim:     #8e8e93;
            --input-bg:     #2c2c2e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        h2 {
            margin-bottom: 8px;
            font-size: 28px;
        }

        .subtitle {
            color: var(--text-dim);
            margin-bottom: 32px;
            font-size: 15px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #3a3a3c;
            background: var(--input-bg);
            color: white;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent-green);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: var(--accent-green);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .toggle-container {
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-dim);
        }

        .toggle-link {
            color: #007aff;
            font-weight: 600;
            cursor: pointer;
            margin-left: 5px;
        }

        .toggle-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 id="auth-title">Sign In</h2>
        <p class="subtitle" id="auth-desc">Enter your details to access your account.</p>

        <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="name@example.com">
        </div>

        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn-submit" id="auth-btn">Continue</button>

        <div class="toggle-container">
            <span id="toggle-text-prefix">Don't have an account?</span>
            <span class="toggle-link" id="toggle-link" onclick="toggleMode()">Create one</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="auth.js" defer></script>
    <script>
        function toggleMode() {
            const title  = document.getElementById('auth-title');
            const desc   = document.getElementById('auth-desc');
            const btn    = document.getElementById('auth-btn');
            const prefix = document.getElementById('toggle-text-prefix');
            const link   = document.getElementById('toggle-link');

            const isLogin = title.innerText === 'Sign In';

            title.innerText  = isLogin ? 'Create Account'                          : 'Sign In';
            desc.innerText   = isLogin ? 'Join to start tracking.'                 : 'Enter your details to access your account.';
            btn.innerText    = isLogin ? 'Sign Up'                                 : 'Continue';
            prefix.innerText = isLogin ? 'Already have an account?'                : "Don't have an account?";
            link.innerText   = isLogin ? 'Sign In'                                 : 'Create one';
        }

        window.onload = () => {
            if (new URLSearchParams(window.location.search).get('mode') === 'signup') {
                toggleMode();
            }
        };
    </script>
</body>
</html>
