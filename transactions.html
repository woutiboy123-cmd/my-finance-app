<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFinance - Transactions</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="accounts.css">
    <link rel="stylesheet" href="transactions.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="transactions.js" defer></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div class="dashboard-container" role="none">
        <aside class="sidebar">
            <a href="dashboard.html" class="sidebar-title">Personal Finance</a>
            <nav>
                <ul class="nav-list">
                    <li><a href="dashboard.html"   class="nav-item">Dashboard</a></li>
                    <li><a href="savings.html"      class="nav-item">Savings</a></li>
                    <li><a href="investments.html"  class="nav-item">Investments</a></li>
                    <li><a href="transactions.html" class="nav-item active">Transactions</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1 class="welcome-text">Transaction History</h1>
            </header>

            <div class="full-width-container">
                <div class="card">
                    <div class="card-header-flex">
                        <h3 class="card-label">History</h3>
                        <button id="main-add-btn" class="btn-add-transaction">Add Transaction +</button>
                    </div>
                    <div id="transactions-list"></div>
                    <div id="pagination" class="pagination"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Transaction Modal -->
    <div id="add-modal-overlay" class="modal-overlay">
        <div class="modal-content-box">
            <p class="card-label">New Transaction</p>
            <form class="modal-body-vertical" autocomplete="nope" onsubmit="return false;">

                <!-- Row 1: date + expense/income toggle -->
                <div class="modal-row modal-row-top">
                    <input type="date" id="trans-date" onclick="this.showPicker()" class="modal-date-field" autocomplete="nope">
                    <div class="trans-type-toggle" id="trans-type-toggle">
                        <span class="toggle-label-expense">Expense</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="trans-type-switch" checked autocomplete="nope">
                            <span class="toggle-track">
                                <span class="toggle-thumb"></span>
                            </span>
                        </label>
                        <span class="toggle-label-income">Income</span>
                    </div>
                </div>

                <!-- Row 2: category dropdown -->
                <select id="trans-category" class="trans-category-select unselected">
                    <option value="" disabled selected hidden>Category</option>
                    <option value="Groceries">Groceries</option>
                    <option value="Rent / Mortgage">Rent / Mortgage</option>
                    <option value="Transportation">Transportation</option>
                    <option value="Insurance">Insurance</option>
                    <option value="Dining Out">Dining Out</option>
                    <option value="Utilities">Utilities</option>
                    <option value="Hobbies">Hobbies</option>
                    <option value="Clothing">Clothing</option>
                    <option value="Personal Care">Personal Care</option>
                    <option value="Medical Expenses">Medical Expenses</option>
                    <option value="Gifts">Gifts</option>
                    <option value="Other">Other</option>
                </select>

                <!-- Row 3: amount -->
                <div class="currency-wrapper-modal">
                    <span>€</span>
                    <input type="number" id="trans-amount" autocomplete="nope" placeholder="0,00" inputmode="decimal">
                </div>

                <input type="text" id="trans-note" autocomplete="nope" class="modal-input-full" placeholder="Note (optional)" maxlength="100" inputmode="text">
            </form>
            <div class="modal-footer-btns">
                <button id="cancel-add-modal">Cancel</button>
                <button id="confirm-add-trans">Add Transaction</button>
            </div>
        </div>
    </div>

    <!-- Validation Alert -->
    <div id="custom-alert" class="modal-overlay">
        <div class="modal-content-box modal-alert">
            <p style="color: var(--text-main, #e0e0e6); font-weight: 500;">Please fill in all required fields.</p>
            <button id="close-alert">OK</button>
        </div>
    </div>

    <!-- Delete Transaction Modal -->
    <div id="delete-trans-overlay" class="modal-overlay">
        <div class="modal-content">
            <p class="card-label" style="color: #f87171;">Delete Transaction</p>
            <form class="modal-body" autocomplete="nope" onsubmit="return false;">
                <p id="delete-trans-text" style="color: var(--text-main, #e0e0e6); font-size: 15px;">Are you sure you want to delete this transaction?</p>
                <div class="modal-buttons">
                    <button id="cancel-delete-trans"  class="btn-secondary">Cancel</button>
                    <button id="confirm-delete-trans" class="btn-delete-confirm">Delete</button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
