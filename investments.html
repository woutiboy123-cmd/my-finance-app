<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investments - Personal Finance</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="accounts.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="investments.js" defer></script>
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <a href="dashboard.html" class="sidebar-title">Personal Finance</a>
            <nav>
                <ul class="nav-list">
                    <li><a href="dashboard.html"   class="nav-item">Dashboard</a></li>
                    <li><a href="savings.html"      class="nav-item">Savings</a></li>
                    <li><a href="investments.html"  class="nav-item active">Investments</a></li>
                    <li><a href="transactions.html" class="nav-item">Transactions</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header>
                <h1 class="welcome-text">Investment Overview</h1>
            </header>

            <section class="stats-grid" style="grid-template-columns: 1fr;">
                <div class="card">
                    <p class="card-label">Total Investment Balance</p>
                    <h2 class="card-value total-balance-value" id="total-investment-amount">€ 0,00</h2>
                </div>
            </section>

            <section class="charts-grid">
                <div class="card">
                    <div class="accounts-header">
                        <h3>Your Portfolios</h3>
                        <button id="add-account-btn" class="add-btn-circle">+</button>
                    </div>
                    <div id="accounts-container"></div>
                </div>

                <div class="card">
                    <p class="card-label">Investment Progress</p>
                    <div class="chart-container" style="height: 280px;">
                        <canvas id="yearlyInvestmentChart"></canvas>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Add Portfolio Modal (name only) -->
    <div id="modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <p class="card-label">New Investment Portfolio</p>
            <form class="modal-body" autocomplete="nope" onsubmit="return false;">
                <input type="text" id="new-account-name" autocomplete="nope" placeholder="Portfolio Name (e.g. S&P 500)" inputmode="text">
                <div class="modal-buttons">
                    <button id="cancel-modal"  class="btn-secondary">Cancel</button>
                    <button id="confirm-modal" class="btn-primary-small">Add Portfolio</button>
                </div>
            </form>
        </div>
    </div>
    </div>

    <!-- Entry history modal -->
    <div id="entry-modal-overlay" class="modal-overlay">
        <div class="modal-content entry-modal-content">
            <div class="entry-modal-header">
                <p class="card-label">Balance History</p>
                <h3 id="entry-modal-title" class="entry-modal-account-name"></h3>
            </div>

            <!-- Add new entry -->
            <div class="entry-add-row">
                <input type="date" id="entry-date" class="modal-date-input entry-date-input" onclick="this.showPicker()" autocomplete="nope">
                <div class="modal-amount-row entry-amount-row">
                    <span class="modal-currency">&euro;</span>
                    <input type="number" id="entry-amount" autocomplete="nope" placeholder="0.00" class="modal-amount-input" inputmode="decimal">
                </div>
                <button id="confirm-entry" class="btn-primary-small entry-confirm-btn">Add</button>
            </div>

            <!-- History list -->
            <div id="entry-history-list" class="entry-history-list"></div>

            <div class="modal-buttons" style="justify-content: flex-end; margin-top: 8px;">
                <button id="close-entry-modal" class="btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <!-- Delete Account Modal -->
    <div id="delete-modal-overlay" class="modal-overlay">
        <div class="modal-content">
            <p class="card-label" style="color: #f87171;">Delete Account</p>
            <form class="modal-body" autocomplete="nope" onsubmit="return false;">
                <p id="delete-modal-text" style="color: var(--text-main); font-size: 15px;">Are you sure you want to delete this account?</p>
                <div class="modal-buttons">
                    <button id="cancel-delete"  class="btn-secondary">Cancel</button>
                    <button id="confirm-delete" class="btn-delete-confirm">Delete</button>
                </div>
            </form>
        </div>
    </div>
    </div>
</body>
</html>
