<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Personal Finance</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .welcome-container {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .welcome-card {
            background: #1c1c1e;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .welcome-logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .welcome-card h1 {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .welcome-card p {
            color: #8e8e93;
            font-size: 14px;
            line-height: 1.5;
        }

        .auth-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }

        .btn-auth {
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-auth:hover {
            transform: scale(1.02);
        }

        .btn-login {
            background-color: #34c759;
            color: white;
        }

        .btn-register {
            background-color: #2c2c2e;
            color: white;
            border: 1px solid #3a3a3c;
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <div class="welcome-card">
            <div class="welcome-logo">💰</div>
            <h1>Personal Finance</h1>
            <p>Keep track of all your spendings, savings and investments.</p>
            <div class="auth-buttons">
                <button class="btn-auth btn-login"    onclick="location.href='login.html'">Login</button>
                <button class="btn-auth btn-register" onclick="location.href='login.html?mode=signup'">Create Account</button>
            </div>
        </div>
    </div>
</body>
</html>
