<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</head>
<body>

    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <h2 class="sidebar-title">Personal Finance</h2>
            <nav>
                <ul class="nav-list">
                    <li><a href="index.html" class="nav-item active">Dashboard</a></li>
                    <li><a href="savings/savings.html" class="nav-item">Savings</a></li>
                    <li><a href="investments/investments.html" class="nav-item">Investments</a></li>
                    <li><a href="transactions/transactions.html" class="nav-item">Transactions</a></li>
                </ul>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h1 class="welcome-text">Welcome back</h1>
            </header>

            <!-- De 3 blokken bovenin -->
            <section class="stats-grid">
                <div class="card highlight-card">
                    <p class="card-label">Total Balance</p>
                    <h2 class="card-value" id="total-combined-balance">€ 0,00</h2>
                </div>
                <div class="card">
                    <p class="card-label">Invested</p>
                    <h2 class="card-value" id="dashboard-investment-amount">€ 0,00</h2>
                </div>
                <div class="card">
                    <p class="card-label">Savings</p>
                    <h2 class="card-value" id="dashboard-savings-amount">€ 0,00</h2>
                </div>
            </section>

            <!-- Grafieken Sectie -->
            <section class="charts-grid">
                <div class="card">
                    <p class="card-label">Portfolio Spread</p>
                    <div class="chart-container" style="height: 300px; position: relative;">
                        <canvas id="portfolioSpreadChart"></canvas>
                    </div>
                </div>
                <div class="card">
                    <p class="card-label">Net Worth Growth</p>
                    <div class="chart-container" style="height: 300px; position: relative;">
                        <canvas id="netWorthChart"></canvas>
                    </div>
                </div>
            </section>

            <section class="transactions-area">
    <div class="card">
        <div class="card-header-flex" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <p class="card-label">Recent Transactions</p>
            <a href="transactions/transactions.html" style="color: #4facfe; text-decoration: none; font-size: 14px; font-weight: 600;">View All</a>
        </div>
        
        <div id="transactions-list">
            <p class="empty-state" style="color: #777; text-align: center; padding: 20px;">Geen recente transacties gevonden.</p>
        </div>
    </div>
</section>

<script src="dashboard-recent.js"></script>
        </main>
    </div>
</body>
</html>
