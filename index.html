<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyFinance</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
    <link rel="stylesheet" href="style.css">
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        .welcome-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        .welcome-card {
            background: #1c1c1e;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
        }
        .welcome-logo {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        .auth-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 30px;
        }
        .btn-auth {
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn-login {
            background-color: #1a7a32;
            color: #ffffff;
        }
        .btn-register {
            background-color: #2c2c2e;
            color: white;
            border: 1px solid #3a3a3c;
        }
        .btn-auth:hover {
            transform: scale(1.02);
        }
        p { color: #8e8e93; margin-top: 20px; }
    </style>
</head>
<body>
    <main class="welcome-container">
        <div class="welcome-card">
            <div class="welcome-logo" role="img" aria-label="Money bag">💰</div>
            <h1>Personal Finance</h1>
            <p>Keep track of all your spendings, Savings and Investments!</p>

            <div class="auth-buttons">
                <button class="btn-auth btn-login" onclick="location.href='login.html'">Login</button>
                <button class="btn-auth btn-register" onclick="location.href='login.html?mode=signup'">Create Account</button>
            </div>
        </div>
    </main>
</body>
</html>
